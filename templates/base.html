<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secure File Share</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --primary: #0b5fff;
            --primary-hover: #084bcc;
            --error: #b42318;
            --ok: #027a48;
            --border: #dbe2ea;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top right, #e3ecff, #f5f7fb 40%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 24px;
        }

        .wrap {
            width: min(860px, 100%);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(15, 23, 42, 0.05);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 1.45rem;
        }

        p {
            margin: 0;
            color: var(--muted);
        }

        .topbar {
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .row {
            margin-top: 14px;
        }

        .field {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"] {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
        }

        .btn {
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            padding: 10px 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #0f172a;
        }

        .btn-secondary:hover {
            background: #cfd8e3;
        }

        .flash {
            margin: 12px 0;
            border-radius: 10px;
            padding: 10px 12px;
            border: 1px solid;
            font-weight: 600;
        }

        .flash.error {
            color: var(--error);
            border-color: #fecdca;
            background: #fef3f2;
        }

        .flash.ok {
            color: var(--ok);
            border-color: #a6f4c5;
            background: #ecfdf3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .inline-form {
            display: inline;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }

        .muted {
            color: var(--muted);
            font-size: 0.92rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            {% with msgs = get_flashed_messages(with_categories=true) %}
                {% for cat, msg in msgs %}
                    <div class="flash {{ cat }}">{{ msg }}</div>
                {% endfor %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
